server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: notification-service
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}
          ssl:
            trust: ${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/medibook_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Abhi@8279}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        auto-startup: ${RABBIT_LISTENERS_AUTO_STARTUP:true}
  jackson:
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://${EUREKA_SERVER_HOST:localhost}:${EUREKA_SERVER_PORT:8761}/eureka}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
    rabbit:
      enabled: ${RABBIT_HEALTH_ENABLED:false}
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: ${AUTH_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${AUTH_SERVICE_READ_TIMEOUT_MS:5000}
  internal:
    api-key: ${INTERNAL_API_KEY:medibook-internal-key-change-me}
    header-name: ${INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    from-address: ${NOTIFICATION_EMAIL_FROM:no-reply@medibook.local}
  sms:
    enabled: ${NOTIFICATION_SMS_ENABLED:false}
    provider-url: ${NOTIFICATION_SMS_PROVIDER_URL:}
    auth-token: ${NOTIFICATION_SMS_AUTH_TOKEN:}
    sender-id: ${NOTIFICATION_SMS_SENDER_ID:MediBook}
  reminders:
    dispatch-interval-ms: ${NOTIFICATION_REMINDER_DISPATCH_INTERVAL_MS:30000}
  messaging:
    rabbit:
      enabled: ${APP_MESSAGING_RABBIT_ENABLED:false}
