server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_UNIQUE

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

medibook:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:*}
  services:
    auth: ${AUTH_SERVICE_URL:lb://auth-service}
    provider: ${PROVIDER_SERVICE_URL:lb://provider-service}
    schedule: ${SCHEDULE_SERVICE_URL:lb://schedule-service}
    appointment: ${APPOINTMENT_SERVICE_URL:lb://appointment-service}
    payment: ${PAYMENT_SERVICE_URL:lb://payment-service}
    review: ${REVIEW_SERVICE_URL:lb://review-service}
    notification: ${NOTIFICATION_SERVICE_URL:lb://notification-service}
    record: ${RECORD_SERVICE_URL:lb://record-service}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.medibook.gateway: INFO
