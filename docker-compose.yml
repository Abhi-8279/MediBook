services:
  mysql:
    image: mysql:8.4
    container_name: medibook-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - medibook-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-Abhi@8279}"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medibook-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: medibook-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  eureka-server:
    build:
      context: ./eureka-server
    container_name: medibook-eureka-server
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: ./auth-service
    container_name: medibook-auth-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
      JWT_SECRET: ${JWT_SECRET:-medibook-auth-secret-key-change-before-production-123456}
    ports:
      - "8081:8081"

  provider-service:
    build:
      context: ./provider-service
    container_name: medibook-provider-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_provider?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
    ports:
      - "8082:8082"

  schedule-service:
    build:
      context: ./schedule-service
    container_name: medibook-schedule-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      provider-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_schedule?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      PROVIDER_SERVICE_URL: http://provider-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
    ports:
      - "8083:8083"

  appointment-service:
    build:
      context: ./appointment-service
    container_name: medibook-appointment-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      provider-service:
        condition: service_started
      schedule-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_appointment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      PROVIDER_SERVICE_URL: http://provider-service:8082
      SCHEDULE_SERVICE_URL: http://schedule-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
    ports:
      - "8084:8084"

  payment-service:
    build:
      context: ./payment-service
    container_name: medibook-payment-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      appointment-service:
        condition: service_started
      provider-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_payment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      APPOINTMENT_SERVICE_URL: http://appointment-service:8084
      PROVIDER_SERVICE_URL: http://provider-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
    ports:
      - "8085:8085"

  review-service:
    build:
      context: ./review-service
    container_name: medibook-review-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      appointment-service:
        condition: service_started
      provider-service:
        condition: service_started
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_review?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      APPOINTMENT_SERVICE_URL: http://appointment-service:8084
      PROVIDER_SERVICE_URL: http://provider-service:8082
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
    ports:
      - "8086:8086"

  notification-service:
    build:
      context: ./notification-service
    container_name: medibook-notification-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-true}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-no-reply@medibook.local}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-true}
      MAIL_SMTP_SSL_TRUST: ${MAIL_SMTP_SSL_TRUST:-smtp.gmail.com}
      MAIL_SMTP_CONNECTION_TIMEOUT_MS: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:-5000}
      MAIL_SMTP_TIMEOUT_MS: ${MAIL_SMTP_TIMEOUT_MS:-5000}
      MAIL_SMTP_WRITE_TIMEOUT_MS: ${MAIL_SMTP_WRITE_TIMEOUT_MS:-5000}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED:-false}
    ports:
      - "8087:8087"

  record-service:
    build:
      context: ./record-service
    container_name: medibook-record-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      appointment-service:
        condition: service_started
      provider-service:
        condition: service_started
      notification-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/medibook_record?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Abhi@8279}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      AUTH_SERVICE_URL: http://auth-service:8081
      APPOINTMENT_SERVICE_URL: http://appointment-service:8084
      PROVIDER_SERVICE_URL: http://provider-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-medibook-internal-key-change-me}
    ports:
      - "8088:8088"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: medibook-api-gateway
    depends_on:
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      provider-service:
        condition: service_started
      schedule-service:
        condition: service_started
      appointment-service:
        condition: service_started
      payment-service:
        condition: service_started
      review-service:
        condition: service_started
      notification-service:
        condition: service_started
      record-service:
        condition: service_started
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      AUTH_SERVICE_URL: http://auth-service:8081
      PROVIDER_SERVICE_URL: http://provider-service:8082
      SCHEDULE_SERVICE_URL: http://schedule-service:8083
      APPOINTMENT_SERVICE_URL: http://appointment-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      REVIEW_SERVICE_URL: http://review-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      RECORD_SERVICE_URL: http://record-service:8088
    ports:
      - "8080:8080"

volumes:
  medibook-mysql-data:
