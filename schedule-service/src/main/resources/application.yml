server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: schedule-service
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/medibook_schedule?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Abhi@8279}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cache:
    type: ${CACHE_TYPE:simple}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: ${AUTH_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${AUTH_SERVICE_READ_TIMEOUT_MS:5000}
  provider-service:
    base-url: ${PROVIDER_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${PROVIDER_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${PROVIDER_SERVICE_READ_TIMEOUT_MS:5000}
  internal:
    api-key: ${INTERNAL_API_KEY:medibook-internal-key-change-me}
    header-name: ${INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}
