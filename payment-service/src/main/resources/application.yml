server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: payment-service
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/medibook_payment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Abhi@8279}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jackson:
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://${EUREKA_SERVER_HOST:localhost}:${EUREKA_SERVER_PORT:8761}/eureka}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    rabbit:
      enabled: ${RABBIT_HEALTH_ENABLED:false}
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: ${AUTH_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${AUTH_SERVICE_READ_TIMEOUT_MS:5000}
  appointment-service:
    base-url: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
    connect-timeout-ms: ${APPOINTMENT_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${APPOINTMENT_SERVICE_READ_TIMEOUT_MS:5000}
  provider-service:
    base-url: ${PROVIDER_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${PROVIDER_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${PROVIDER_SERVICE_READ_TIMEOUT_MS:5000}
  internal:
    api-key: ${INTERNAL_API_KEY:medibook-internal-key-change-me}
    header-name: ${INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}
  payment:
    default-currency: ${PAYMENT_DEFAULT_CURRENCY:INR}
    razorpay:
      enabled: ${RAZORPAY_ENABLED:true}
      key-id: ${RAZORPAY_KEY_ID:rzp_test_SjzEMHV8QnBYi8}
      key-secret: ${RAZORPAY_KEY_SECRET:hpt5cU45U4E8DQ8D56dgc8qz}
      api-base-url: ${RAZORPAY_API_BASE_URL:https://api.razorpay.com/v1}
      connect-timeout-ms: ${RAZORPAY_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${RAZORPAY_READ_TIMEOUT_MS:10000}
      checkout-name: ${RAZORPAY_CHECKOUT_NAME:MediBook}
      checkout-description: ${RAZORPAY_CHECKOUT_DESCRIPTION:Appointment payment}
      checkout-image-url: ${RAZORPAY_CHECKOUT_IMAGE_URL:}
