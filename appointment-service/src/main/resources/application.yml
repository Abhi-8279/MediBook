server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: appointment-service
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/medibook_appointment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Abhi@8279}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jackson:
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    rabbit:
      enabled: ${RABBIT_HEALTH_ENABLED:false}
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: ${AUTH_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${AUTH_SERVICE_READ_TIMEOUT_MS:5000}
  provider-service:
    base-url: ${PROVIDER_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${PROVIDER_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${PROVIDER_SERVICE_READ_TIMEOUT_MS:5000}
  schedule-service:
    base-url: ${SCHEDULE_SERVICE_URL:http://localhost:8083}
    connect-timeout-ms: ${SCHEDULE_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${SCHEDULE_SERVICE_READ_TIMEOUT_MS:5000}
  payment-service:
    base-url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
    connect-timeout-ms: ${PAYMENT_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${PAYMENT_SERVICE_READ_TIMEOUT_MS:5000}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
    connect-timeout-ms: ${NOTIFICATION_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${NOTIFICATION_SERVICE_READ_TIMEOUT_MS:5000}
  cancellation:
    refund-notice-hours: ${APPOINTMENT_REFUND_NOTICE_HOURS:24}
  internal:
    api-key: ${INTERNAL_API_KEY:medibook-internal-key-change-me}
    header-name: ${INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}
