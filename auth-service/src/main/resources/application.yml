server:
  port: ${SERVER_PORT:8081}

spring:
  config:
    import: optional:classpath:application-oauth.yml
  application:
    name: auth-service
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/medibook_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Abhi@8279}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://${EUREKA_SERVER_HOST:localhost}:${EUREKA_SERVER_PORT:8761}/eureka}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:medibook-auth-secret-key-change-before-production-123456}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:86400000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  oauth2:
    authorized-redirect-uris:
      - ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
  admin:
    email: ${ADMIN_EMAIL:admin@medibook.com}
    password: ${ADMIN_PASSWORD:Admin@12345}
    full-name: ${ADMIN_FULL_NAME:MediBook Admin}
  internal:
    api-key: ${INTERNAL_API_KEY:medibook-internal-key-change-me}
    header-name: ${INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}
  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
    connect-timeout-ms: ${NOTIFICATION_SERVICE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${NOTIFICATION_SERVICE_READ_TIMEOUT_MS:5000}
  password-reset:
    expiration-ms: ${PASSWORD_RESET_EXPIRATION_MS:1800000}
    frontend-base-url: ${PASSWORD_RESET_FRONTEND_BASE_URL:http://localhost:5173/reset-password}
